name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      bump: ${{ steps.check.outputs.bump }}
      pr_title: ${{ steps.check.outputs.pr_title }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check merged PR for release label
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the PR that was merged for this push
          PR=$(gh pr list --state merged --search "${{ github.sha }}" --json number,labels,title --limit 1)

          if [ "$PR" = "[]" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LABELS=$(echo "$PR" | jq -r '.[0].labels[].name' 2>/dev/null || echo "")
          TITLE=$(echo "$PR" | jq -r '.[0].title' 2>/dev/null || echo "")

          if echo "$LABELS" | grep -q "release-major"; then
            BUMP="major"
          elif echo "$LABELS" | grep -q "release-minor"; then
            BUMP="minor"
          elif echo "$LABELS" | grep -q "release-patch"; then
            BUMP="patch"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          {
            echo "pr_title<<EOF"
            echo "$TITLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version from git tags
        id: version
        run: |
          # Get the latest version tag, default to 0.0.0 if none exist
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -1 | sed 's/^v//')
          if [ -z "$LATEST" ]; then
            LATEST="0.0.0"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"

          case "${{ needs.check-release.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Update app version
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: \"$APP_VERSION\"/" project.yml

      - name: Build app
        run: |
          xcodegen generate
          xcodebuild -project Supermoji.xcodeproj \
            -scheme SupermojiApp \
            -configuration Release \
            -derivedDataPath .build/release-app \
            build

      - name: Sign and package DMG
        id: dmg
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          APP_PATH=".build/release-app/Build/Products/Release/Supermoji.app"
          DMG_NAME="Supermoji-${RELEASE_TAG}.dmg"

          codesign --deep --force --sign "-" --options runtime "$APP_PATH"

          hdiutil create -volname "Supermoji" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Tag release
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          DMG_NAME: ${{ steps.dmg.outputs.dmg_name }}
          PR_TITLE: ${{ needs.check-release.outputs.pr_title }}
        run: |
          gh release create "$RELEASE_TAG" \
            "$DMG_NAME" \
            --title "$RELEASE_TAG" \
            --notes "$PR_TITLE"
